name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build+test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt check (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          drift=$(gofmt -s -d .)
          if [ -n "$drift" ]; then
            echo "gofmt drift:"
            echo "$drift"
            exit 1
          fi

      - name: gofmt check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $drift = & gofmt -s -d .
          if ($drift) {
            Write-Host "gofmt drift:"
            Write-Host $drift
            exit 1
          }

      - name: Test
        run: go test ./...

      - name: Test (race)
        run: go test -race ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
